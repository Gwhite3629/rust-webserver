HttpListener {
    Protocol: HTTP
    Path: ./defaultpath
    Port: 7878
    Host: 127.0.0.1
    Location: / (
        redirect: /http
        auth: Basic
        name: RootHTTP@localhost
        user: http
        pass: password
    )
    Location: favicon.ico (
        redirect: ../favicon.ico
    )
}
HttpsListener {
    Protocol: HTTPS
    Path: ./defaultpath
    Port: 8443
    Host: 127.0.0.1
    Cert: cert/Identity.pem
    Key: cert/leaf_key.pem
    Location: / (
        redirect: /https
        auth: Digest
        name: RootHTTPS@localhost
        user: https
        pass: password
    )
    Location: root (
        redirect: ../
    )
    Location: favicon.ico (
        redirect: ../favicon.ico
    )
}